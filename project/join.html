<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Caracas Updates</title>
    <meta name="description" content="Join form for the Caracas City Guide community updates.">
    <meta name="author" content="Erick">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/project.css">
    <script src="scripts/project.js" defer></script>
</head>
<body>
    <header>
        <div class="header-inner">
            <p class="site-title">Caracas City Guide</p>
            <button id="menuButton" aria-label="Open navigation" aria-expanded="false">Menu</button>
            <nav id="mainNav" class="nav-hidden">
                <a href="index.html">Home</a>
                <a href="discover.html">Discover</a>
                <a href="join.html" aria-current="page">Join</a>
                <a href="siteplan.html">Site Plan</a>
            </nav>
        </div>
    </header>
    <main>
        <h1>Join the Newsletter</h1>
        <form id="joinForm">
            <label for="fullName">Full Name *</label>
            <input type="text" id="fullName" name="fullName" required>

            <label for="email">Email *</label>
            <input type="email" id="email" name="email" required>

            <label for="interest">Primary Interest *</label>
            <select id="interest" name="interest" required>
                <option value="" selected disabled>Select one ...</option>
                <option value="nature">Nature</option>
                <option value="culture">Culture</option>
                <option value="food">Food</option>
            </select>

            <button type="submit">Join Now</button>
        </form>
        <p id="joinMessage" class="success-message" aria-live="polite"></p>
    </main>
    <footer>
        <p>&copy; <span id="currentyear"></span> Erick. Venezuela</p>
        <p id="lastModified"></p>
        <p><a href="references.html">References</a></p>
    </footer>
</body>
</html>

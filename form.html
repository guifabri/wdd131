<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 - Product Review Form - Erick</title>
    <meta name="description" content="WDD 131 product review form assignment with dynamic product options.">
    <meta name="author" content="Erick">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
    <script src="scripts/getdates.js" defer></script>
</head>
<body>
    <header>
        <span id="course-title">Product Review Form</span>
    </header>
    <main>
        <h1>Submit a Product Review</h1>
        <form method="get" action="review.html">
            <fieldset>
                <legend>Review Details</legend>

                <label for="productName">Product Name *</label>
                <select id="productName" name="productName" required>
                    <option value="" selected disabled>Select a Product ...</option>
                </select>

                <p class="label-like">Overall Rating *</p>
                <div class="rating-group" role="radiogroup" aria-label="Overall Rating">
                    <label><input type="radio" id="rating1" name="rating" value="1" required> 1 Star</label>
                    <label><input type="radio" id="rating2" name="rating" value="2" required> 2 Stars</label>
                    <label><input type="radio" id="rating3" name="rating" value="3" required> 3 Stars</label>
                    <label><input type="radio" id="rating4" name="rating" value="4" required> 4 Stars</label>
                    <label><input type="radio" id="rating5" name="rating" value="5" required> 5 Stars</label>
                </div>

                <label for="installDate">Date of Installation *</label>
                <input type="date" id="installDate" name="installDate" required>

                <p class="label-like">Useful Features</p>
                <div class="features-group">
                    <label for="durability"><input type="checkbox" id="durability" name="features" value="durability"> Durability</label>
                    <label for="ease"><input type="checkbox" id="ease" name="features" value="ease-of-use"> Ease of Use</label>
                    <label for="performance"><input type="checkbox" id="performance" name="features" value="performance"> Performance</label>
                    <label for="design"><input type="checkbox" id="design" name="features" value="design"> Design</label>
                </div>

                <label for="writtenReview">Written Review (Optional)</label>
                <textarea id="writtenReview" name="writtenReview" rows="5" placeholder="Share your experience with this product"></textarea>

                <label for="userName">Your Name (Optional)</label>
                <input type="text" id="userName" name="userName" autocomplete="name">
            </fieldset>

            <input type="submit" value="Post Review">
        </form>
    </main>
    <footer>
        <p>&copy; <span id="currentyear"></span> Erick. USA</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
